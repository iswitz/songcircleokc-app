<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Song Circle Lyrics</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="library-panel" aria-label="Song library">
        <div class="brand-row">
          <div>
            <p class="eyebrow">Song Circle</p>
            <h1>Lyrics</h1>
          </div>
          <button class="icon-button" id="presentButton" type="button" aria-label="Presentation mode" title="Presentation mode">
            <span aria-hidden="true">⛶</span>
          </button>
        </div>

        <label class="search-field">
          <span class="visually-hidden">Search songs</span>
          <input id="songSearch" type="search" placeholder="Search songs or keys" autocomplete="off">
        </label>

        <div class="toolbar-row" aria-label="Lyrics controls">
          <button class="tool-button" id="decreaseFont" type="button" aria-label="Decrease lyric size" title="Decrease lyric size">A-</button>
          <button class="tool-button" id="increaseFont" type="button" aria-label="Increase lyric size" title="Increase lyric size">A+</button>
          <button class="tool-button" id="themeToggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">☾</button>
          <button class="tool-button" id="columnsToggle" type="button" aria-label="Toggle lyric columns" title="Toggle lyric columns">▦</button>
        </div>

        <nav class="song-list" id="songList" aria-label="Songs"></nav>
      </aside>

      <main class="lyrics-stage">
        <section class="song-header" aria-live="polite">
          <div>
            <p class="song-meta" id="songMeta"></p>
            <h2 id="songTitle"></h2>
          </div>
          <div class="key-badge" id="songKey" aria-label="Song key"></div>
        </section>

        <section class="set-notes" aria-label="Song notes">
          <div>
            <span class="note-label">Tempo</span>
            <strong id="songTempo"></strong>
          </div>
          <div>
            <span class="note-label">Feel</span>
            <strong id="songFeel"></strong>
          </div>
          <div>
            <span class="note-label">Leader</span>
            <strong id="songLeader"></strong>
          </div>
        </section>

        <article class="lyrics-card" id="lyricsCard" tabindex="0" aria-label="Selected song lyrics">
          <div class="lyrics-content" id="lyricsContent"></div>
        </article>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
